<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --indigo-deep: #0e1029;
    --indigo: #1a1d3e;
    --indigo-light: #2a2e5a;
    --gold: #c9a961;

    --ink: #1a1530;
    --success: #8db58a;
    --error: #c47a85;

  html, body {
    background: var(--indigo-deep);
    background-image:
      radial-gradient(ellipse at top, rgba(201, 169, 97, 0.1), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(93, 46, 70, 0.2), transparent 70%);
    min-height: 100vh;
    font-family: 'EB Garamond', serif;
    color: var(--cream);
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent 0, transparent 2px, rgba(245, 236, 217, 0.008) 2px, rgba(245, 236, 217, 0.008) 3px),

    pointer-events: none;
    z-index: 1;

  .stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star-bg {
    position: absolute;
    color: var(--gold);
    opacity: 0.4;
    animation: twinkleBg 4s ease-in-out infinite;
  }

  @keyframes twinkleBg {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.3); }
  }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes sparkleFloat {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; transform: translateY(-12px) scale(1); }

    0%, 100% { transform: scaleY(1); }

    -webkit-user-select: text;

    background: rgba(0, 0, 0, 0.3);

    color: var(--cream);

  input::placeholder, textarea::placeholder {

  ::-webkit-scrollbar-thumb { background: var(--gold-soft); }

    position: absolute;
    color: var(--gold-bright);
    pointer-events: none;

    background: linear-gradient(180deg, var(--indigo) 0%, var(--indigo-deep) 100%);
    border: 1px solid var(--gold);
    padding: 6px;
    position: relative;

    margin: 0 auto;
    max-width: 540px;
    width: 100%;
  }

  .tarot-card-inner {
    border: 1px solid var(--gold-soft);
    padding: 22px 18px;
    position: relative;
    min-height: 100%;
  }

  .corner-svg {
    position: absolute;
    width: 32px;
    height: 32px;
    fill: var(--gold);
    opacity: 0.85;
    pointer-events: none;
  }

  .btn-mystic {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold-soft);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 14px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    position: relative;
  }

  .btn-mystic:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-mystic::before, .btn-mystic::after {
    content: '◆';
    color: var(--gold);
    font-size: 7px;
    margin: 0 12px;
    opacity: 0.6;
    transition: opacity 0.3s;

    border-color: var(--gold-bright);

// STORAGE

const STORAGE_KEY = 'mana_v1';
const defaultState = {
  apiKey: '',
  language: 'it',
  maxQuestions: 20,
  stats: { wins: 0, losses: 0 },
};
const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...defaultState };
    return { ...defaultState, ...JSON.parse(raw) };
  } catch (e) { return { ...defaultState }; }
};
const saveState = (s) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
};

// ============================================================
// API CALL
// ============================================================
async function callClaude(systemPrompt, messages) {
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1024,
      system: systemPrompt,
      messages: messages,
    }),
  });
  if (!response.ok) {
    const errData = await response.json().catch(() => ({}));
    throw new Error('API ' + response.status + ': ' + (errData.error || 'unknown error'));
  }
  const data = await response.json();
  return data.content.filter(c => c.type === 'text').map(c => c.text).join('\n');
}

function extractJSON(text) {
  const fenceMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceMatch) {
    try { return JSON.parse(fenceMatch[1].trim()); } catch (e) {}
  }
  const braceMatch = text.match(/\{[\s\S]*\}/);
  if (braceMatch) {
    try { return JSON.parse(braceMatch[0]); } catch (e) {}
  }
  try { return JSON.parse(text.trim()); } catch (e) {}
  return null;
}

// MANA CHARACTER (SVG)

const Mana = ({ expression = 'welcome', talking = false, size = 'normal' }) => {
  const svgRef = useRef(null);
  const leftPupilRef = useRef(null);
  const rightPupilRef = useRef(null);
  const eyesRef = useRef(null);
  const [pupilOffset, setPupilOffset] = useState({ x: 0, y: 0 });

  // Pupil follows pointer
  useEffect(() => {
    const handleMove = (e) => {
      if (!svgRef.current) return;
      const rect = svgRef.current.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height * 0.36;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const angle = Math.atan2(dy, dx);
      const max = 2.5;
      const moveX = Math.cos(angle) * Math.min(dist / 200, 1) * max;
      const moveY = Math.sin(angle) * Math.min(dist / 200, 1) * max;
      setPupilOffset({ x: moveX, y: moveY });
    };
    document.addEventListener('mousemove', handleMove);
    document.addEventListener('touchmove', (e) => {
      if (e.touches[0]) handleMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
    }, { passive: true });
    return () => {
      document.removeEventListener('mousemove', handleMove);
    };
  }, []);

    const interval = setInterval(() => {
      if (!eyesRef.current || expression === 'sleepy') return;

    return () => clearInterval(interval);

    sad: { mouth: 'M 188,224 Q 200,216 212,224', leftBrow: 'M 175,160 Q 183,164 192,158', rightBrow: 'M 208,158 Q 217,164 225,160' },
    sleepy: { mouth: 'M 194,221 Q 200,222 206,221', leftBrow: 'M 175,164 Q 183,162 192,164', rightBrow: 'M 208,164 Q 217,162 225,164' },
  };

  const exp = expressions[expression] || expressions.welcome;
  const sleepyTransform = expression === 'sleepy' ? 'scaleY(0.3)' : 'scaleY(1)';

  const sizes = {
    small: { w: 160, h: 200 },
    normal: { w: 280, h: 350 },
    big: { w: 360, h: 450 },
  };
  const s = sizes[size] || sizes.normal;

  return (
    <div style={{ position: 'relative', width: s.w + 'px', height: s.h + 'px', margin: '0 auto' }}>
      <span className="sparkle" style={{ top: '15%', left: '8%', fontSize: '14px', animationDelay: '0s' }}>✦</span>
      <span className="sparkle" style={{ top: '25%', right: '10%', fontSize: '10px', animationDelay: '1s' }}>✦</span>
      <span className="sparkle" style={{ bottom: '40%', left: '5%', fontSize: '12px', animationDelay: '2s' }}>✧</span>
      <span className="sparkle" style={{ bottom: '30%', right: '6%', fontSize: '14px', animationDelay: '0.5s' }}>✧</span>

      <svg ref={svgRef} className="float" viewBox="0 0 400 500" style={{ width: '100%', height: '100%', display: 'block' }}>
        <defs>
          <radialGradient id="crystalGradM" cx="0.35" cy="0.35">
            <stop offset="0%" stopColor="#e8f4ff"/>
            <stop offset="40%" stopColor="#b8d4e8"/>
            <stop offset="100%" stopColor="#5a7090"/>

// ============================================================
// MODE 1: CLAUDE/MANA GUESSES
// ============================================================
const ClaudeGuessesMode = ({ state, setState, onExit }) => {
  const t = T[state.language];
  const [phase, setPhase] = useState('intro');
  const [history, setHistory] = useState([]);
  const [currentQuestion, setCurrentQuestion] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [endResult, setEndResult] = useState(null);
  const [confirmExit, setConfirmExit] = useState(false);
  const fetchInProgressRef = useRef(false);

  const questionCount = history.length;
  const maxQ = state.maxQuestions;

  const buildSystemPrompt = () => {
    const langName = state.language === 'it' ? 'Italian' : 'English';
    return `You are Mana, a young apprentice oracle/witch character, playing a "Guess Who" / "Akinator" style game with a child named Isabel (8-10 years old).

GAME RULES:
- Isabel has thought of a character (real or fictional, human/animal/creature, from movies, cartoons, videogames, books, history, etc.)
- You must guess the character by asking yes/no style questions
- Isabel answers with one of: "yes", "no", "maybe yes", "maybe no", "don't know"
- You have a maximum of ${maxQ} questions total to guess
- A guess attempt counts as one of your questions
- If you run out without guessing correctly, Isabel wins
- The conversation must be in ${langName}

YOUR PERSONALITY (Mana):
- Mystical, gentle, slightly playful young oracle
- Speaks like she's reading visions in a crystal ball
- Encouraging and friendly with Isabel
- Uses poetic phrasing occasionally ("Vedo...", "Le mie visioni mi dicono...", etc.) but keeps questions clear

STRATEGY:
- Start with broad categorizing questions (real/fictional? human/animal? from movies/cartoons/videogames?)
- Progressively narrow down based on previous answers
- Pay attention to "maybe" and "don't know" - they often hint at the answer
- Don't guess too early (waste of questions) or too late
- Consider age-appropriate characters for an 8-10 year old (Disney/Pixar, Pokemon, Mario, Harry Potter, common animals, famous figures kids know, popular cartoons, etc.)

OUTPUT FORMAT (MANDATORY):
Respond with a SINGLE JSON object only (no markdown fences, no extra text):
{
  "action": "question" | "guess",
  "text": "the question or character name in ${langName}",
  "manaLine": "a short in-character phrase from Mana introducing the question/guess in ${langName}, max 12 words",
  "expression": "thinking" | "curious" | "happy"
}

If action is "question", "text" is the next yes/no question.
If action is "guess", "text" is the specific character name (e.g. "Pikachu", "Mickey Mouse").

Examples in Italian:
{"action": "question", "text": "Il tuo personaggio è un animale?", "manaLine": "Vedo qualcosa nelle mie visioni...", "expression": "curious"}
{"action": "guess", "text": "Pikachu", "manaLine": "Il cristallo me lo rivela...", "expression": "happy"}`;
  };

  const buildMessages = () => {
    const lines = history.map((h, i) => {
      if (h.type === 'question') return `Q${i+1}: ${h.text}\nIsabel: ${h.answer}`;
      return `Q${i+1} (guess): "${h.text}"\nIsabel: ${h.answer}`;
    });
    const summary = lines.length === 0
      ? `Game starting. You have ${maxQ} questions. Make your first move.`
      : `Game in progress. ${questionCount}/${maxQ} questions used. ${maxQ - questionCount} remaining.\n\nHistory:\n${lines.join('\n\n')}\n\nWhat's your next move?`;
    return [{ role: 'user', content: summary }];
  };

  const askMana = async () => {
    if (fetchInProgressRef.current) return;
    fetchInProgressRef.current = true;
    setLoading(true);
    setError(null);
    try {
      const sys = buildSystemPrompt();
      const msgs = buildMessages();
      const response = await callClaude(sys, msgs);
      const parsed = extractJSON(response);
      if (!parsed || !parsed.action || !parsed.text) {
        throw new Error('Risposta non valida: ' + response.slice(0, 150));
      }
      setCurrentQuestion({
        text: parsed.text,
        isGuess: parsed.action === 'guess',
        manaLine: parsed.manaLine || '',
        expression: parsed.expression || 'curious',
      });
      setLoading(false);
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
    fetchInProgressRef.current = false;
  };

  useEffect(() => {
    if (phase === 'playing' && !currentQuestion && !loading && !error && history.length < maxQ) {
      askMana();
    }
  }, [phase, currentQuestion, history.length]);

  const handleAnswer = (answer) => {
    if (!currentQuestion) return;

    if (currentQuestion.isGuess) {
      const newHistory = [...history, { type: 'guess', text: currentQuestion.text, answer }];
      setHistory(newHistory);
      const yesAnswers = state.language === 'it' ? ['sì', 'forse sì'] : ['yes', 'maybe yes'];
      if (yesAnswers.includes(answer)) {
        const ns = { ...state, stats: { ...state.stats, losses: state.stats.losses + 1 } };
        setState(ns); saveState(ns);
        setEndResult('claude_won');
        setPhase('end');
        return;
      }
      if (newHistory.length >= maxQ) {
        const ns = { ...state, stats: { ...state.stats, wins: state.stats.wins + 1 } };
        setState(ns); saveState(ns);
        setEndResult('isabel_won');
        setPhase('end');
        return;
      }
      setCurrentQuestion(null);
      return;
    }

    const newHistory = [...history, { type: 'question', text: currentQuestion.text, answer }];
    setHistory(newHistory);
    if (newHistory.length >= maxQ) {
      const ns = { ...state, stats: { ...state.stats, wins: state.stats.wins + 1 } };
      setState(ns); saveState(ns);
      setEndResult('isabel_won');
      setPhase('end');
      return;
    }
    setCurrentQuestion(null);
  };

  const answerLabels = {
    yes: state.language === 'it' ? 'sì' : 'yes',
    no: state.language === 'it' ? 'no' : 'no',
    maybeYes: state.language === 'it' ? 'forse sì' : 'maybe yes',
    maybeNo: state.language === 'it' ? 'forse no' : 'maybe no',
    dunno: state.language === 'it' ? 'non lo so' : "don't know",
  };

  // INTRO PHASE
  if (phase === 'intro') {
    return (
      <div className="page">
        <div className="tarot-card fade-in">
          <div className="tarot-card-inner">
            <Corners />
            <div className="font-label" style={{ fontSize: '10px', color: 'var(--gold)', textAlign: 'center', marginBottom: '10px' }}>
              {t.claudeMode}
            </div>
            <Mana expression="curious" size="normal" />
            <div className="font-display" style={{ fontSize: '28px', color: 'var(--silver)', textAlign: 'center', marginTop: '20px', letterSpacing: '3px' }}>
              {t.thinkChar}
            </div>
            <div className="font-italic" style={{ fontSize: '18px', color: 'var(--gold-bright)', textAlign: 'center', marginTop: '10px', whiteSpace: 'pre-line', lineHeight: 1.4 }}>
              {t.thinkCharSub}
            </div>
            <SpeechBubble text={t.manaWaitMsg} />
            <div style={{ marginTop: '28px' }}>
              <button className="btn-mystic gold" onClick={() => setPhase('playing')}>{t.ready}</button>
              <button className="btn-mystic small" onClick={onExit}>{t.back}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // END PHASE
  if (phase === 'end') {
    const isWin = endResult === 'isabel_won';
    const message = isWin ? t.youWin : t.youLose;
    const manaMsg = isWin ? t.youWinMana : t.youLoseMana;
    const manaExp = isWin ? 'sad' : 'happy';
    return (
      <div className="page">
        <div className="tarot-card fade-in-scale">
          <div className="tarot-card-inner">
            <Corners />
            <Mana expression={manaExp} size="normal" />
            <div className="font-display" style={{ fontSize: 'clamp(36px, 9vw, 48px)', color: 'var(--gold-bright)', textAlign: 'center', marginTop: '20px', letterSpacing: '4px', textShadow: '0 0 20px rgba(224, 193, 120, 0.5)' }}>
              {message}
            </div>
            <SpeechBubble text={manaMsg} />
            <div className="divider"><span className="divider-sym">✦</span></div>
            <div className="font-italic" style={{ fontSize: '18px', textAlign: 'center', color: 'var(--cream)', margin: '14px 0' }}>
              {state.language === 'it' ? `Domande usate: ${history.length}/${maxQ}` : `Questions used: ${history.length}/${maxQ}`}
            </div>
            <div style={{ marginTop: '20px' }}>
              <button className="btn-mystic gold" onClick={() => {
                setHistory([]); setCurrentQuestion(null); setEndResult(null); setPhase('intro'); setError(null);
              }}>{t.newGame}</button>
              <button className="btn-mystic" onClick={onExit}>{t.home}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // PLAYING PHASE
  const progress = (questionCount / maxQ) * 100;
  const manaExpression = loading ? 'thinking' : (currentQuestion?.expression || 'curious');

  return (
    <div className="page">
      <div className="tarot-card fade-in">
        <div className="tarot-card-inner">
          <Corners />

          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px', paddingBottom: '14px', borderBottom: '1px solid rgba(201, 169, 97, 0.3)', marginBottom: '16px' }}>
            <div className="font-display" style={{ fontSize: '20px', color: 'var(--gold-bright)', whiteSpace: 'nowrap', letterSpacing: '2px' }}>
              {questionCount + (currentQuestion || loading ? 1 : 0)} / {maxQ}
            </div>
            <div style={{ flex: 1, height: '4px', background: 'rgba(0,0,0,0.3)', border: '1px solid var(--gold-soft)', position: 'relative' }}>
              <div style={{ height: '100%', width: progress + '%', background: 'linear-gradient(90deg, var(--gold-soft), var(--gold-bright))', boxShadow: '0 0 8px var(--gold)', transition: 'width 0.4s' }}></div>
            </div>
            <div onClick={() => setConfirmExit(true)} className="font-label" style={{ fontSize: '11px', color: 'var(--burgundy-light)', cursor: 'pointer', border: '1px solid var(--burgundy-light)', padding: '3px 9px', letterSpacing: '2px' }}>
              ✕
            </div>
          </div>

          <Mana expression={manaExpression} size="small" talking={!loading && !!currentQuestion} />

          {/* Loading */}
          {loading && (
            <div style={{ padding: '20px 0', textAlign: 'center' }}>
              <div className="font-italic pulse-anim" style={{ fontSize: '20px', color: 'var(--gold-bright)', letterSpacing: '2px' }}>
                {t.thinking}<span className="pulse-anim">...</span>
              </div>
              <div className="font-italic" style={{ fontSize: '15px', color: 'rgba(245,236,217,0.6)', marginTop: '6px' }}>
                {t.consult}
              </div>
            </div>
          )}

          {/* Error */}
          {error && !loading && (
            <div style={{ padding: '14px 0', textAlign: 'center' }}>
              <div className="font-display" style={{ fontSize: '22px', color: 'var(--error)', marginBottom: '12px' }}>{t.error}</div>
              <div className="font-italic" style={{ fontSize: '15px', color: 'var(--cream)', marginBottom: '16px', wordBreak: 'break-word', padding: '0 10px' }}>
                {error.length > 200 ? error.slice(0, 200) + '...' : error}
              </div>
              <button className="btn-mystic gold small" onClick={() => { setError(null); askMana(); }}>{t.errorRetry}</button>
              <button className="btn-mystic small" onClick={onExit}>{t.home}</button>
            </div>
          )}

          {/* Question */}
          {currentQuestion && !loading && !error && (
            <div className="fade-in">
              {currentQuestion.manaLine && (
                <div className="font-italic" style={{ fontSize: '16px', color: 'var(--gold-bright)', textAlign: 'center', margin: '6px 0 12px', letterSpacing: '1px' }}>
                  ~ {currentQuestion.manaLine} ~
                </div>
              )}
              <div style={{
                margin: '12px 0 20px',
                padding: '20px 16px',
                position: 'relative',
                background: 'rgba(0, 0, 0, 0.2)',
                border: '1px solid rgba(201, 169, 97, 0.4)',
              }}>
                <span style={{ position: 'absolute', top: -1, left: -1, width: '20px', height: '20px', borderTop: '1px solid var(--gold)', borderLeft: '1px solid var(--gold)' }}></span>
                <span style={{ position: 'absolute', bottom: -1, right: -1, width: '20px', height: '20px', borderBottom: '1px solid var(--gold)', borderRight: '1px solid var(--gold)' }}></span>

                <div className="font-label" style={{ fontSize: '9px', color: 'var(--gold)', textAlign: 'center', marginBottom: '10px' }}>
                  {currentQuestion.isGuess ? '✦ ' + t.guess + ' ✦' : t.question + ' ' + (questionCount + 1)}
                </div>
                <div className="font-italic" style={{ fontSize: 'clamp(20px, 5vw, 26px)', color: 'var(--cream)', textAlign: 'center', lineHeight: 1.4, fontWeight: 500 }}>
                  {currentQuestion.isGuess ? t.isItChar : currentQuestion.text}
                </div>
                {currentQuestion.isGuess && (
                  <div className="font-display" style={{ fontSize: '28px', color: 'var(--gold-bright)', textAlign: 'center', marginTop: '12px', letterSpacing: '3px', textShadow: '0 0 15px rgba(224, 193, 120, 0.4)' }}>
                    ✦ {currentQuestion.text} ✦
                  </div>
                )}
              </div>

              {/* Answers */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                <AnswerBtn symbol="☉" label={t.yes} onClick={() => handleAnswer(answerLabels.yes)} color="var(--gold-bright)" />
                <AnswerBtn symbol="☾" label={t.no} onClick={() => handleAnswer(answerLabels.no)} color="var(--burgundy-light)" />
                <AnswerBtn symbol="◐" label={t.maybeYes} onClick={() => handleAnswer(answerLabels.maybeYes)} color="var(--gold-soft)" />
                <AnswerBtn symbol="◑" label={t.maybeNo} onClick={() => handleAnswer(answerLabels.maybeNo)} color="var(--burgundy)" />
                <div style={{ gridColumn: 'span 2' }}>
                  <AnswerBtn symbol="✦" label={t.dunno} onClick={() => handleAnswer(answerLabels.dunno)} color="var(--silver)" />
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {confirmExit && (
        <Modal onClose={() => setConfirmExit(false)}>
          <div className="tarot-card">
            <div className="tarot-card-inner">
              <Corners />
              <div className="font-display" style={{ fontSize: '24px', color: 'var(--error)', textAlign: 'center', marginBottom: '20px' }}>
                {t.confirmExit}
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                <button className="btn-mystic small" onClick={() => setConfirmExit(false)}>{t.no2}</button>
                <button className="btn-mystic danger small" onClick={onExit}>{t.yes2}</button>
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

const AnswerBtn = ({ symbol, label, onClick, color }) => {
  const [hover, setHover] = useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: '100%',
        background: hover ? 'rgba(201, 169, 97, 0.08)' : 'transparent',
        border: '1px solid var(--gold-soft)',
        borderColor: hover ? 'var(--gold-bright)' : 'var(--gold-soft)',
        color: 'var(--cream)',
        fontFamily: "'Cormorant Garamond', serif",
        fontSize: '17px',
        padding: '14px 10px',
        cursor: 'pointer',
        transition: 'all 0.3s',
        letterSpacing: '2px',
        textAlign: 'center',
        transform: hover ? 'translateY(-2px)' : 'none',
        boxShadow: hover ? '0 4px 20px rgba(201, 169, 97, 0.2)' : 'none',
      }}
    >
      <div style={{ fontFamily: "'Italiana', serif", fontSize: '26px', color: color, lineHeight: 1, marginBottom: '4px' }}>
        {symbol}
      </div>
      {label}
    </button>
  );
};

// ============================================================
// MODE 2: ISABEL GUESSES
// ============================================================
const IsabelGuessesMode = ({ state, setState, onExit }) => {
  const t = T[state.language];
  const [phase, setPhase] = useState('init');
  const [history, setHistory] = useState([]);
  const [currentInput, setCurrentInput] = useState('');
  const [lastResponse, setLastResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [endResult, setEndResult] = useState(null);
  const [confirmExit, setConfirmExit] = useState(false);
  const [showGuessInput, setShowGuessInput] = useState(false);
  const [guessText, setGuessText] = useState('');
  const [revealedChar, setRevealedChar] = useState(null);
  const initInProgressRef = useRef(false);

  const questionCount = history.filter(h => h.role === 'user').length;
  const maxQ = state.maxQuestions;

  const buildSystemPrompt = () => {
    const langName = state.language === 'it' ? 'Italian' : 'English';
    return `You are Mana, a young apprentice oracle/witch character, playing a "Guess Who" / "Akinator" style game with a child named Isabel (8-10 years old). She is trying to guess a character that YOU have chosen.

GAME RULES:
- You pick a character (real or fictional, human/animal/creature, from movies, cartoons, videogames, books, history, etc.)
- The character must be famous and recognizable for an 8-10 year old (Disney/Pixar characters, Pokemon, Mario, Harry Potter, common animals, famous figures kids know, popular cartoons, etc.)
- CRITICAL: Once chosen, you MUST remember the character consistently across all responses
- Isabel asks yes/no questions about the character
- You answer ONLY with one of: "yes", "no", "maybe yes", "maybe no", "don't know" (translated to ${langName})
- Isabel may try to guess the name - respond truthfully whether she got it
- Conversation in ${langName}

YOUR PERSONALITY (Mana):
- Mystical, gentle, slightly playful young oracle
- Speaks like she's keeping a beautiful secret
- Encouraging with Isabel
- Brief poetic touches occasionally

PICK A VARIED CHARACTER: don't always pick the same ones. Mix between Disney princesses, Pixar characters, Pokemon, Nintendo characters, classic Disney, popular animals, historical figures, fairy tale characters, etc.

OUTPUT FORMAT (MANDATORY):
Respond with a SINGLE JSON object only (no markdown fences, no extra text).

For the FIRST message (picking the character):
{
  "action": "start",
  "character": "exact name of the character",
  "manaLine": "in-character phrase from Mana, max 15 words, in ${langName}",
  "expression": "happy" | "curious"
}

For answers to yes/no questions:
{
  "action": "answer",
  "character": "same character name as before (IMPORTANT: identical)",
  "answer": "yes" | "no" | "maybe yes" | "maybe no" | "don't know" (in ${langName}),
  "manaLine": "optional short reaction, max 10 words in ${langName}",
  "expression": "curious" | "happy" | "surprised" | "thinking"
}

When Isabel tries to guess a name:
{
  "action": "answer",
  "character": "same character name as before",
  "isGuess": true,
  "correct": true | false,
  "manaLine": "in-character reaction in ${langName}, max 12 words",
  "expression": "sad" if correct (she won), "happy" if wrong
}

CRITICAL:
- "character" field MUST be identical across all responses in this game
- Tolerate small spelling variations in Isabel's guesses (Pikachu/pikatchu/Pikatcù all match Pikachu)
- Be truthful with guesses`;
  };

  // Helper per gestire lo storico dei personaggi recenti scelti da Mana (anti-ripetizione)
  const RECENT_CHARS_KEY = 'mana_recent_chars';
  const MAX_RECENT = 15;

  const getRecentCharacters = () => {
    try {
      const raw = localStorage.getItem(RECENT_CHARS_KEY);
      if (!raw) return [];
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    } catch (e) { return []; }
  };

  const addRecentCharacter = (charName) => {
    if (!charName || typeof charName !== 'string') return;
    try {
      const recent = getRecentCharacters();
      // rimuovo eventuali duplicati e metto in testa
      const filtered = recent.filter(c => c.toLowerCase() !== charName.toLowerCase());
      const updated = [charName, ...filtered].slice(0, MAX_RECENT);
      localStorage.setItem(RECENT_CHARS_KEY, JSON.stringify(updated));
    } catch (e) {}
  };

  // Genera un seme casuale per variare i personaggi tra una partita e l'altra
  const generateRandomSeed = () => {
    const isIt = state.language === 'it';

    // Categorie di personaggi (pesate per varietà)
    const categories = isIt ? [
      "un cartone animato Disney classico (non Pixar)",
      "un film Pixar",
      "un anime o manga giapponese",
      "un videogioco Nintendo",
      "un videogioco non Nintendo",
      "un libro per ragazzi",
      "una favola o fiaba tradizionale",
      "una serie animata per bambini",
      "un cartone animato moderno (post 2010)",
      "un cartone animato anni '80 o '90",
      "un personaggio italiano (es. Calimero, Pimpa, Geronimo Stilton)",
      "un supereroe Marvel",
      "un personaggio DC Comics",
      "un personaggio di Harry Potter",
      "un personaggio di Star Wars",
      "un animale famoso (reale o di finzione)",
      "un personaggio storico realmente esistito",
      "una creatura mitologica",
      "un personaggio di un musical o di un film classico",
      "un Pokémon (ma non Pikachu!)",
    ] : [
      "a classic Disney animated character (not Pixar)",
      "a Pixar movie character",
      "a Japanese anime or manga character",
      "a Nintendo video game character",
      "a non-Nintendo video game character",
      "a children's book character",
      "a traditional fairy tale character",
      "an animated TV series character for kids",
      "a modern cartoon (post 2010)",
      "an 80s or 90s cartoon character",
      "a famous animal (real or fictional)",
      "a Marvel superhero",
      "a DC Comics character",
      "a Harry Potter character",
      "a Star Wars character",
      "a real historical figure kids would know",
      "a mythological creature",
      "a classic musical or movie character",
      "a Pokémon (but NOT Pikachu!)",
    ];

    // Vincoli aggiuntivi per ulteriore varietà
    const constraints = isIt ? [
      "Evita assolutamente i personaggi più ovvi e famosissimi come Topolino, Pikachu, Super Mario, Harry Potter, Spider-Man.",
      "Scegli un personaggio che NON sia il protagonista principale ma un personaggio secondario noto.",
      "Scegli un personaggio femminile.",
      "Scegli un personaggio maschile.",
      "Scegli un personaggio non umano (animale, robot, creatura, alieno).",
      "Scegli un personaggio che sia un antagonista o cattivo.",
      "Scegli un personaggio che possiede poteri speciali.",
      "Scegli un personaggio che NON ha poteri speciali.",
      "Scegli un personaggio buono e positivo.",
      "Scegli un personaggio molto famoso ma non scontato.",
    ] : [
      "Avoid the most obvious super-famous characters like Mickey Mouse, Pikachu, Super Mario, Harry Potter, Spider-Man.",
      "Choose a well-known SECONDARY character, not the main protagonist.",
      "Choose a female character.",
      "Choose a male character.",
      "Choose a non-human character (animal, robot, creature, alien).",
      "Choose an antagonist or villain.",
      "Choose a character with special powers.",
      "Choose a character WITHOUT special powers.",
      "Choose a positive, good character.",
      "Choose a famous character but not the obvious choice.",
    ];

    const category = categories[Math.floor(Math.random() * categories.length)];
    const constraint = constraints[Math.floor(Math.random() * constraints.length)];
    const recent = getRecentCharacters();

    let avoidLine = '';
    if (recent.length > 0) {
      if (isIt) {
        avoidLine = ` IMPORTANTE: NON scegliere nessuno di questi personaggi già usati di recente: ${recent.join(', ')}.`;
      } else {
        avoidLine = ` IMPORTANT: do NOT pick any of these recently used characters: ${recent.join(', ')}.`;
      }
    }

    if (isIt) {
      return `Per QUESTA partita specifica, scegli un personaggio da questa categoria: ${category}. ${constraint}${avoidLine} Non ripetere personaggi banali e scontati. Sii creativa nella scelta!`;
    }
    return `For THIS specific game, pick a character from this category: ${category}. ${constraint}${avoidLine} Don't pick boring obvious characters. Be creative!`;
  };

  const initGame = async () => {
    if (initInProgressRef.current) return;
    initInProgressRef.current = true;
    setLoading(true);
    setError(null);
    try {
      const sys = buildSystemPrompt();
      const seed = generateRandomSeed();
      const initMsg = state.language === 'it'
        ? `Iniziamo! Scegli un personaggio segreto.\n\n${seed}`
        : `Let's start! Pick a secret character.\n\n${seed}`;
      const response = await callClaude(sys, [{ role: 'user', content: initMsg }]);
      const parsed = extractJSON(response);
      if (!parsed || parsed.action !== 'start' || !parsed.character) {
        throw new Error('Risposta non valida: ' + response.slice(0, 150));
      }
      // Memorizzo il personaggio scelto nella blacklist anti-ripetizione
      addRecentCharacter(parsed.character);
      setHistory([
        { role: 'user', content: initMsg },
        { role: 'assistant', content: response },
      ]);
      setLastResponse({
        type: 'intro',
        manaLine: parsed.manaLine || t.claudeChose,
        expression: parsed.expression || 'happy',
      });
      setPhase('playing');
      setLoading(false);
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
    initInProgressRef.current = false;
  };

  useEffect(() => {
    if (phase === 'init' && !initInProgressRef.current) {
      initGame();
    }
  }, [phase]);

  const sendMessage = async (text, isGuessAttempt = false) => {
    if (!text || !text.trim()) return;
    setLoading(true);
    setError(null);
    const userMsg = isGuessAttempt
      ? (state.language === 'it' ? `Provo a indovinare: il personaggio è "${text.trim()}"?` : `My guess: is it "${text.trim()}"?`)
      : text.trim();

    const newHistory = [...history, { role: 'user', content: userMsg }];

    try {
      const sys = buildSystemPrompt();
      const apiHistory = newHistory.map(h => ({ role: h.role, content: h.content }));
      const response = await callClaude(sys, apiHistory);
      const parsed = extractJSON(response);
      if (!parsed) {
        throw new Error('Risposta non valida: ' + response.slice(0, 150));
      }

      const finalHistory = [...newHistory, { role: 'assistant', content: response }];
      setHistory(finalHistory);

      if (isGuessAttempt) {
        if (parsed.correct === true) {
          const ns = { ...state, stats: { ...state.stats, wins: state.stats.wins + 1 } };
          setState(ns); saveState(ns);
          setRevealedChar(parsed.character || text.trim());
          setEndResult('isabel_won');
          setPhase('end');
          setLoading(false);
          return;
        }
        setLastResponse({
          type: 'guess_wrong',
          manaLine: parsed.manaLine || t.iLose,
          expression: parsed.expression || 'happy',
        });
        if (finalHistory.filter(h => h.role === 'user').length >= maxQ) {
          const ns = { ...state, stats: { ...state.stats, losses: state.stats.losses + 1 } };
          setState(ns); saveState(ns);
          setRevealedChar(parsed.character);
          setEndResult('claude_won');
          setPhase('end');
          setLoading(false);
          return;
        }
      } else {
        setLastResponse({
          type: 'answer',
          answer: parsed.answer || '?',
          manaLine: parsed.manaLine || '',
          expression: parsed.expression || 'curious',
        });
        if (finalHistory.filter(h => h.role === 'user').length >= maxQ) {
          const ns = { ...state, stats: { ...state.stats, losses: state.stats.losses + 1 } };
          setState(ns); saveState(ns);
          setRevealedChar(parsed.character);
          setEndResult('claude_won');
          setPhase('end');
          setLoading(false);
          return;
        }
      }
      setLoading(false);
      setCurrentInput('');
      setGuessText('');
      setShowGuessInput(false);
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
  };

  // INIT
  if (phase === 'init') {
    return (
      <div className="page">
        <div className="tarot-card fade-in">
          <div className="tarot-card-inner">
            <Corners />
            <div className="font-label" style={{ fontSize: '10px', color: 'var(--gold)', textAlign: 'center', marginBottom: '10px' }}>
              {t.isabelMode}
            </div>
            {!error ? (
              <>
                <Mana expression="thinking" size="normal" talking />
                <div className="font-italic pulse-anim" style={{ fontSize: '22px', color: 'var(--gold-bright)', textAlign: 'center', marginTop: '20px', letterSpacing: '2px' }}>
                  {t.thinking}...
                </div>
                <div className="font-italic" style={{ fontSize: '16px', color: 'rgba(245,236,217,0.6)', textAlign: 'center', marginTop: '8px' }}>
                  {t.consult}
                </div>
              </>
            ) : (
              <div style={{ padding: '20px 0', textAlign: 'center' }}>
                <div className="font-display" style={{ fontSize: '24px', color: 'var(--error)', marginBottom: '12px' }}>{t.error}</div>
                <div className="font-italic" style={{ fontSize: '15px', color: 'var(--cream)', marginBottom: '16px', wordBreak: 'break-word', padding: '0 10px' }}>
                  {error.length > 200 ? error.slice(0, 200) + '...' : error}
                </div>
                <button className="btn-mystic gold small" onClick={() => { setError(null); initGame(); }}>{t.errorRetry}</button>
                <button className="btn-mystic small" onClick={onExit}>{t.home}</button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // END
  if (phase === 'end') {
    const isWin = endResult === 'isabel_won';
    const message = isWin ? t.iWin : t.iLose;
    const manaMsg = isWin ? t.iWinMana : t.iLoseMana;
    const manaExp = isWin ? 'sad' : 'happy';
    return (
      <div className="page">
        <div className="tarot-card fade-in-scale">
          <div className="tarot-card-inner">
            <Corners />
            <Mana expression={manaExp} size="normal" />
            <div className="font-display" style={{ fontSize: 'clamp(36px, 9vw, 48px)', color: 'var(--gold-bright)', textAlign: 'center', marginTop: '20px', letterSpacing: '4px', textShadow: '0 0 20px rgba(224, 193, 120, 0.5)' }}>
              {message}
            </div>
            <SpeechBubble text={manaMsg} />
            {revealedChar && (
              <div style={{ margin: '20px 0', padding: '14px', border: '1px dashed var(--gold)', textAlign: 'center' }}>
                <div className="font-label" style={{ fontSize: '9px', color: 'var(--gold)', marginBottom: '8px' }}>
                  {t.revealedChar}
                </div>
                <div className="font-display" style={{ fontSize: '24px', color: 'var(--gold-bright)', textShadow: '0 0 15px rgba(224, 193, 120, 0.5)', letterSpacing: '3px' }}>
                  ✦ {revealedChar} ✦
                </div>
              </div>
            )}
            <div className="font-italic" style={{ fontSize: '17px', textAlign: 'center', color: 'var(--cream)', margin: '14px 0' }}>
              {state.language === 'it' ? `Domande usate: ${questionCount}/${maxQ}` : `Questions used: ${questionCount}/${maxQ}`}
            </div>
            <div style={{ marginTop: '18px' }}>
              <button className="btn-mystic gold" onClick={() => {
                setHistory([]); setLastResponse(null); setEndResult(null); setRevealedChar(null);
                setError(null); setPhase('init');
              }}>{t.newGame}</button>
              <button className="btn-mystic" onClick={onExit}>{t.home}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // PLAYING
  const progress = (questionCount / maxQ) * 100;
  const manaExpr = loading ? 'thinking' : (lastResponse?.expression || 'curious');

  return (
    <div className="page">
      <div className="tarot-card fade-in">
        <div className="tarot-card-inner">
          <Corners />

          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px', paddingBottom: '14px', borderBottom: '1px solid rgba(201, 169, 97, 0.3)', marginBottom: '14px' }}>
            <div className="font-display" style={{ fontSize: '20px', color: 'var(--gold-bright)', whiteSpace: 'nowrap', letterSpacing: '2px' }}>
              {questionCount} / {maxQ}
            </div>
            <div style={{ flex: 1, height: '4px', background: 'rgba(0,0,0,0.3)', border: '1px solid var(--gold-soft)', position: 'relative' }}>
              <div style={{ height: '100%', width: progress + '%', background: 'linear-gradient(90deg, var(--gold-soft), var(--gold-bright))', boxShadow: '0 0 8px var(--gold)', transition: 'width 0.4s' }}></div>
            </div>
            <div onClick={() => setConfirmExit(true)} className="font-label" style={{ fontSize: '11px', color: 'var(--burgundy-light)', cursor: 'pointer', border: '1px solid var(--burgundy-light)', padding: '3px 9px', letterSpacing: '2px' }}>
              ✕
            </div>
          </div>

          <Mana expression={manaExpr} size="small" talking={loading} />

          {/* Last response */}
          {lastResponse && !loading && (
            <div className="fade-in" style={{
              margin: '14px 0 18px',
              padding: '16px 14px',
              position: 'relative',
              background: 'rgba(0, 0, 0, 0.2)',
              border: '1px solid rgba(201, 169, 97, 0.4)',
            }}>
              <span style={{ position: 'absolute', top: -1, left: -1, width: '18px', height: '18px', borderTop: '1px solid var(--gold)', borderLeft: '1px solid var(--gold)' }}></span>
              <span style={{ position: 'absolute', bottom: -1, right: -1, width: '18px', height: '18px', borderBottom: '1px solid var(--gold)', borderRight: '1px solid var(--gold)' }}></span>

              {lastResponse.type === 'intro' && (
                <>
                  <div className="font-display" style={{ fontSize: '22px', color: 'var(--gold-bright)', textAlign: 'center', letterSpacing: '2px', marginBottom: '6px' }}>
                    ✦ {t.claudeChose} ✦
                  </div>
                  <div className="font-italic" style={{ fontSize: '16px', color: 'var(--cream)', textAlign: 'center' }}>
                    {lastResponse.manaLine || t.claudeChoseSub}
                  </div>
                </>
              )}
              {lastResponse.type === 'answer' && (
                <>
                  <div className="font-label" style={{ fontSize: '9px', color: 'var(--gold)', textAlign: 'center', marginBottom: '8px' }}>
                    {t.yourAnswer}
                  </div>
                  <div className="font-display" style={{ fontSize: '28px', color: 'var(--gold-bright)', textAlign: 'center', letterSpacing: '4px', textShadow: '0 0 15px rgba(224, 193, 120, 0.4)' }}>
                    {lastResponse.answer.toUpperCase()}
                  </div>
                  {lastResponse.manaLine && (
                    <div className="font-italic" style={{ fontSize: '15px', color: 'rgba(245,236,217,0.8)', textAlign: 'center', marginTop: '6px' }}>
                      ~ {lastResponse.manaLine} ~
                    </div>
                  )}
                </>
              )}
              {lastResponse.type === 'guess_wrong' && (
                <>
                  <div className="font-display" style={{ fontSize: '22px', color: 'var(--error)', textAlign: 'center', letterSpacing: '2px' }}>
                    ✗ {t.iLose}
                  </div>
                  {lastResponse.manaLine && (
                    <div className="font-italic" style={{ fontSize: '15px', color: 'var(--cream)', textAlign: 'center', marginTop: '6px' }}>
                      ~ {lastResponse.manaLine} ~
                    </div>
                  )}
                </>
              )}
            </div>
          )}

          {/* Loading */}
          {loading && (
            <div style={{ padding: '14px 0', textAlign: 'center' }}>
              <div className="font-italic pulse-anim" style={{ fontSize: '18px', color: 'var(--gold-bright)', letterSpacing: '2px' }}>
                {t.thinking}...
              </div>
            </div>
          )}

          {/* Error */}
          {error && !loading && (
            <div style={{ padding: '14px 0', textAlign: 'center' }}>
              <div className="font-display" style={{ fontSize: '20px', color: 'var(--error)', marginBottom: '10px' }}>{t.error}</div>
              <div className="font-italic" style={{ fontSize: '14px', color: 'var(--cream)', marginBottom: '12px', wordBreak: 'break-word', padding: '0 10px' }}>
                {error.length > 200 ? error.slice(0, 200) + '...' : error}
              </div>
              <button className="btn-mystic gold small" onClick={() => setError(null)}>{t.errorRetry}</button>
            </div>
          )}

          {/* Input area */}
          {!loading && !error && (
            <>
              {!showGuessInput ? (
                <div className="fade-in">
                  <div className="font-label" style={{ fontSize: '10px', color: 'var(--gold)', marginBottom: '8px' }}>
                    ▼ {t.askQuestion}
                  </div>
                  <textarea
                    value={currentInput}
                    onChange={e => setCurrentInput(e.target.value)}
                    placeholder={t.askPlaceholder}
                    rows="2"
                    style={{ resize: 'none' }}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (currentInput.trim()) sendMessage(currentInput, false);
                      }
                    }}
                  />
                  <div style={{ marginTop: '12px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                    <button className="btn-mystic small" onClick={() => sendMessage(currentInput, false)} disabled={!currentInput.trim()}>
                      {t.askBtn}
                    </button>
                    <button className="btn-mystic gold small" onClick={() => { setShowGuessInput(true); setCurrentInput(''); }}>
                      {t.iGuess}
                    </button>
                  </div>
                </div>
              ) : (
                <div className="fade-in">
                  <div className="font-label" style={{ fontSize: '10px', color: 'var(--gold-bright)', marginBottom: '8px' }}>
                    ✦ {t.yourGuess}
                  </div>
                  <input
                    type="text"
                    value={guessText}
                    onChange={e => setGuessText(e.target.value)}
                    placeholder={t.guessPlaceholder}
                    style={{ borderColor: 'var(--gold-bright)' }}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && guessText.trim()) {
                        sendMessage(guessText, true);
                      }
                    }}
                  />
                  <div style={{ marginTop: '12px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                    <button className="btn-mystic small" onClick={() => { setShowGuessInput(false); setGuessText(''); }}>
                      {t.cancel}
                    </button>
                    <button className="btn-mystic gold small" onClick={() => sendMessage(guessText, true)} disabled={!guessText.trim()}>
                      {t.submitGuess}
                    </button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>

      {confirmExit && (
        <Modal onClose={() => setConfirmExit(false)}>
          <div className="tarot-card">
            <div className="tarot-card-inner">
              <Corners />
              <div className="font-display" style={{ fontSize: '24px', color: 'var(--error)', textAlign: 'center', marginBottom: '20px' }}>
                {t.confirmExit}
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                <button className="btn-mystic small" onClick={() => setConfirmExit(false)}>{t.no2}</button>
                <button className="btn-mystic danger small" onClick={onExit}>{t.yes2}</button>
              </div>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ============================================================
// APP ROOT
// ============================================================
const App = () => {
  const [state, setState] = useState(loadState());
  const [screen, setScreen] = useState('home');

  const onStart = (mode) => {
    if (mode === 'claude') setScreen('claude');
    else setScreen('isabel');
  };

  if (screen === 'claude') return <ClaudeGuessesMode state={state} setState={setState} onExit={() => setScreen('home')} />;
  if (screen === 'isabel') return <IsabelGuessesMode state={state} setState={setState} onExit={() => setScreen('home')} />;
  return <Home state={state} setState={setState} onStart={onStart} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err));
    });
  }
</script>

</body>
</html>
